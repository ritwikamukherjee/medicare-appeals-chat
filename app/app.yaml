command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"
env:
  # Substituted by the DAB at bundle deploy time using databricks.yml variables.
  - name: MAS_ENDPOINT_NAME
    value: "${var.mas_endpoint_name}"
  - name: WAREHOUSE_ID
    value: "${var.warehouse_id}"
  - name: CATALOG
    value: "${var.catalog}"
  - name: SCHEMA
    value: "${var.schema}"
